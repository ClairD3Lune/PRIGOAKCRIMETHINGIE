<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL_ACCESS</title>
    <style>
        :root {
            --neon-green: #39ff14;
            --dark-bg: #0a0a0a;
            --error-red: #ff3131;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        #terminal-screen, #image-page {
            text-align: center;
            width: 95%;
            max-width: 1200px;
            padding: 20px;
        }

        .hidden { display: none !important; }

        .cursor {
            display: inline-block;
            width: 12px;
            height: 24px;
            background: var(--neon-green);
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        @keyframes blink { 50% { opacity: 0; } }

        input {
            background: transparent;
            border: none;
            color: var(--neon-green);
            font-family: 'Courier New', monospace;
            font-size: 2rem;
            width: 180px;
            text-align: center;
            letter-spacing: 8px;
            outline: none;
            caret-color: transparent;
        }

        .img-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: flex-start;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        img {
            max-width: 90vw;
            width: auto;
            max-height: 75vh; 
            height: auto;
            border: 1px solid var(--neon-green);
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.15);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            object-fit: contain;
        }

        img:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.4);
        }

        .status-text {
            font-size: 0.85rem;
            margin: 5px 0;
            opacity: 0.7;
            letter-spacing: 1px;
        }

        #error-msg {
            color: var(--error-red);
            font-weight: bold;
            height: 20px;
            margin-top: 15px;
            text-shadow: 0 0 5px var(--error-red);
        }

        a { color: white; text-decoration: none; border-bottom: 1px dashed white; font-size: 0.8rem; }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-8px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div id="terminal-screen">
        <p class="status-text">[ SECURE_KERNEL_LOADED ]</p>
        <p class="status-text">> OVERRIDE REQUIRED...</p>
        <p style="font-size: 1.1rem; margin: 30px 0 10px 0;">ENTER 5-DIGIT PROTOCOL:</p>
        
        <div style="margin: 10px 0;">
            <span>[</span>
            <input type="text" id="accessCode" maxlength="5" autocomplete="off" autofocus>
            <span>]</span>
            <div class="cursor"></div>
        </div>
        <p id="error-msg"></p>
    </div>

    <div id="image-page" class="hidden">
        <p style="font-size: 1.5rem; margin-bottom: 5px;">> ACCESS GRANTED</p>
        <p class="status-text">> DECRYPTING ASSETS FROM /ASSET/...</p>
        
        <div class="img-container">
            <img src="asset/pic1.png" alt="Decrypted File 01">
            <img src="asset/pic2.png" alt="Decrypted File 02">
        </div>

        <br><br>
        <p class="status-text">> <a href="#" onclick="location.reload()">TERMINATE_SESSION</a></p>
    </div>

    <script>
        const input = document.getElementById('accessCode');
        const entryScreen = document.getElementById('terminal-screen');
        const imagePage = document.getElementById('image-page');
        const errorDisplay = document.getElementById('error-msg');
        const KEY = "81104";

        input.addEventListener('input', () => {
            errorDisplay.innerText = ""; 
            if (input.value.length === 5) {
                if (input.value === KEY) {
                    entryScreen.classList.add('hidden');
                    imagePage.classList.remove('hidden');
                } else {
                    errorDisplay.innerText = "!! ERR_INVALID_KEYCODE !!";
                    input.value = "";
                    entryScreen.style.animation = "shake 0.3s ease-in-out";
                    setTimeout(() => entryScreen.style.animation = "", 300);
                }
            }
        });

        document.body.addEventListener('click', () => input.focus());
    </script>
</body>
</html>
